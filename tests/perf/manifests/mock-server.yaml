---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: perf-mock-server
  labels:
    app: perf-mock-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: perf-mock-server
  template:
    metadata:
      labels:
        app: perf-mock-server
    spec:
      containers:
      - name: perf-mock-server
        image: ghcr.io/kuadrant/mcp-gateway/perf-mock-server:latest
        imagePullPolicy: Never
        command: ["./perf-mock-server"]
        args: ["--addr=0.0.0.0:8080"]
        ports:
        - containerPort: 8080
          name: http
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: perf-mock-server
  labels:
    app: perf-mock-server
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: perf-mock-server
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: perf-mock-server-route
  labels:
    mcp-server: 'true'
spec:
  parentRefs:
    - name: mcp-gateway
      namespace: gateway-system
  hostnames:
    - 'perf-mock.mcp.local'
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: perf-mock-server
          port: 8080
